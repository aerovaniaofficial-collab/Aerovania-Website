<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs Admin — Aerovania</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <!-- Quill rich text editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --cyan: #34C0C5;
      --cyan-dark: #2a9a9e;
      --red: #ef4444;
      --green: #22c55e;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1rem;
    }
    .login-card {
      background: var(--card); border-radius: 20px; padding: 2.5rem;
      width: 100%; max-width: 380px; box-shadow: var(--shadow); text-align: center;
    }
    .login-card h1 { font-family: 'Sora', sans-serif; font-size: 1.5rem; margin-bottom: .4rem; }
    .login-card p { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }
    .login-card input {
      width: 100%; padding: .8rem 1rem; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: .95rem; outline: none; margin-bottom: 1rem;
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--cyan); }
    .login-error { color: var(--red); font-size: .85rem; margin-bottom: .75rem; display: none; }

    /* ── Layout ── */
    #app { display: none; }
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: .9rem 2rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .topbar-brand { display: flex; flex-direction: column; }
    .topbar-brand span { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.05rem; color: var(--cyan); }
    .topbar-brand small { font-size: .75rem; color: var(--muted); }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .badge-count { background: rgba(52,192,197,.12); color: var(--cyan); font-size: .8rem; font-weight: 600; padding: .3rem .75rem; border-radius: 50px; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .6rem 1.2rem; border-radius: 10px; border: none; font-family: 'Inter', sans-serif; font-size: .88rem; font-weight: 600; cursor: pointer; transition: .18s; }
    .btn-primary { background: var(--cyan); color: #fff; }
    .btn-primary:hover { background: var(--cyan-dark); }
    .btn-danger { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-sm { padding: .4rem .85rem; font-size: .82rem; }

    /* ── Add card ── */
    .add-card { background: var(--card); border-radius: 16px; padding: 1.75rem; box-shadow: var(--shadow); margin-bottom: 2rem; }
    .add-card h2 { font-family: 'Sora', sans-serif; font-size: 1.1rem; margin-bottom: 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-grid .full { grid-column: 1 / -1; }
    .field label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .4px; }
    .field input, .field select {
      width: 100%; padding: .7rem 1rem; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'Inter', sans-serif; font-size: .92rem;
      outline: none; transition: border-color .2s; background: #fff;
    }
    .field input:focus, .field select:focus { border-color: var(--cyan); }
    .form-actions { display: flex; align-items: center; gap: 1rem; margin-top: 1.25rem; }
    .add-msg { font-size: .85rem; color: var(--green); font-weight: 600; display: none; }

    /* ── Quill editor ── */
    .quill-label { font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .4px; display: block; }
    .ql-container { font-family: 'Inter', sans-serif !important; font-size: .92rem !important; border-radius: 0 0 10px 10px !important; border-color: var(--border) !important; min-height: 160px; }
    .ql-toolbar { border-radius: 10px 10px 0 0 !important; border-color: var(--border) !important; background: var(--bg); }
    .ql-toolbar.ql-snow .ql-formats { margin-right: 10px; }
    .ql-editor { min-height: 150px; }
    .ql-editor.ql-blank::before { color: #aaa; font-style: normal !important; }

    /* ── Job list ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-header h2 { font-family: 'Sora', sans-serif; font-size: 1.05rem; }
    .job-list { display: flex; flex-direction: column; gap: .75rem; }
    .job-row {
      background: var(--card); border-radius: 14px; padding: 1.1rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; box-shadow: var(--shadow); flex-wrap: wrap;
    }
    .job-row.inactive { opacity: .55; }
    .job-row-info h4 { font-size: .95rem; font-weight: 600; margin-bottom: .35rem; }
    .job-tags { display: flex; gap: .5rem; flex-wrap: wrap; }
    .tag { font-size: .72rem; font-weight: 600; padding: .2rem .65rem; border-radius: 50px; background: rgba(52,192,197,.1); color: var(--cyan); }
    .tag.dept { background: #f0f4f8; color: var(--muted); }
    .tag.inactive-tag { background: #fef2f2; color: var(--red); }
    .job-row-actions { display: flex; gap: .5rem; flex-shrink: 0; }

    /* ── Edit row ── */
    .edit-row { display: none; background: #f8fafc; border-radius: 0 0 14px 14px; padding: 1.25rem; border-top: 1px solid var(--border); margin-top: -2px; }
    .edit-row.open { display: block; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .edit-grid .full { grid-column: 1 / -1; }
    .edit-row input, .edit-row select {
      width: 100%; padding: .65rem .9rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: 'Inter', sans-serif; font-size: .9rem; outline: none; transition: border-color .2s;
    }
    .edit-row input:focus, .edit-row select:focus { border-color: var(--cyan); }

    /* Edit Quill */
    .edit-row .ql-container { min-height: 120px; }
    .edit-row .ql-editor { min-height: 110px; }

    /* ── Toggle switch ── */
    .toggle-wrap { display: flex; align-items: center; gap: .6rem; font-size: .85rem; color: var(--muted); }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 50px; cursor: pointer; transition: .2s; }
    .slider::before { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; left: 3px; top: 3px; transition: .2s; }
    .toggle input:checked + .slider { background: var(--cyan); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: .95rem; }

    @media (max-width: 600px) {
      .form-grid, .edit-grid { grid-template-columns: 1fr; }
      .form-grid .full, .edit-grid .full { grid-column: 1; }
      .topbar { padding: .9rem 1rem; }
      .main { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Aerovania Admin</h1>
    <p>Enter your admin key to manage job postings</p>
    <p class="login-error" id="login-error">Incorrect key. Try again.</p>
    <input type="password" id="key-input" placeholder="Admin key" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="login()">Sign In</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <span>Jobs Admin</span>
      <small>Aerovania Careers</small>
    </div>
    <div class="topbar-right">
      <span class="badge-count" id="active-count">0 active</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- Add new job -->
    <div class="add-card">
      <h2>Add New Job Posting</h2>
      <div class="form-grid">
        <div class="field full">
          <label>Job Title *</label>
          <input type="text" id="new-title" placeholder="e.g. GIS & Drone Survey Intern">
        </div>
        <div class="field">
          <label>Employment Type</label>
          <select id="new-type">
            <option>Full-Time</option>
            <option>Part-Time</option>
            <option>Contract</option>
            <option>Internship</option>
          </select>
        </div>
        <div class="field">
          <label>Location</label>
          <input type="text" id="new-location" placeholder="e.g. Nagpur / Remote">
        </div>
        <div class="field">
          <label>Department</label>
          <input type="text" id="new-dept" placeholder="e.g. Geospatial">
        </div>
      </div>
      <!-- Rich text JD editor -->
      <div style="margin-bottom:1.25rem;">
        <span class="quill-label">Job Description</span>
        <div id="new-desc-editor"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="add-btn" onclick="addJob()">+ Add Job</button>
        <span class="add-msg" id="add-msg">✓ Job added successfully</span>
      </div>
    </div>

    <!-- Job list -->
    <div class="section-header">
      <h2>Current Postings</h2>
    </div>
    <div class="job-list" id="job-list">
      <div class="empty">Loading...</div>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
  const API_BASE = 'https://aerovania-website.onrender.com';
  const API = API_BASE + '/api';
  let ADMIN_KEY = '';

  // ── Quill toolbar config ───────────────────────────────────────────────────
  const TOOLBAR = [
    [{ header: [2, 3, false] }],
    ['bold', 'italic'],
    [{ list: 'ordered' }, { list: 'bullet' }],
    ['clean']
  ];

  // Add-form Quill instance
  const newQuill = new Quill('#new-desc-editor', {
    theme: 'snow',
    placeholder: 'Describe the role, responsibilities, required skills, eligibility, and duration...',
    modules: { toolbar: TOOLBAR }
  });

  // Map of edit Quill instances keyed by job id
  const editQuilts = {};

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function login() {
    const key = document.getElementById('key-input').value.trim();
    if (!key) return;
    document.getElementById('login-error').style.display = 'none';
    try {
      const res = await fetch(`${API}/admin/jobs`, { headers: { 'x-admin-key': key } });
      if (res.ok) {
        ADMIN_KEY = key;
        sessionStorage.setItem('aero_admin_key', key);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadJobs();
      } else {
        document.getElementById('login-error').style.display = 'block';
        sessionStorage.removeItem('aero_admin_key');
      }
    } catch {
      document.getElementById('login-error').textContent = 'Cannot reach server. Is the backend running?';
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('aero_admin_key');
    location.reload();
  }

  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('aero_admin_key');
    if (saved) {
      document.getElementById('key-input').value = saved;
      setTimeout(login, 50);
    }
    document.getElementById('key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  });

  // ── Load jobs ─────────────────────────────────────────────────────────────
  async function loadJobs() {
    const res = await fetch(`${API}/admin/jobs`, { headers: { 'x-admin-key': ADMIN_KEY } });
    const jobs = await res.json();
    renderJobs(jobs);
    document.getElementById('active-count').textContent = `${jobs.filter(j => j.active).length} active`;
  }

  function renderJobs(jobs) {
    const list = document.getElementById('job-list');
    if (!jobs.length) { list.innerHTML = '<div class="empty">No job postings yet. Add one above.</div>'; return; }
    list.innerHTML = jobs.map(job => `
      <div>
        <div class="job-row ${job.active ? '' : 'inactive'}" id="row-${job.id}">
          <div class="job-row-info">
            <h4>${esc(job.title)}</h4>
            <div class="job-tags">
              <span class="tag">${esc(job.type)}</span>
              ${job.location ? `<span class="tag">${esc(job.location)}</span>` : ''}
              ${job.department ? `<span class="tag dept">${esc(job.department)}</span>` : ''}
              ${!job.active ? '<span class="tag inactive-tag">Hidden</span>' : ''}
            </div>
          </div>
          <div class="job-row-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${job.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteJob('${job.id}', '${esc(job.title)}')">Delete</button>
          </div>
        </div>
        <div class="edit-row" id="edit-${job.id}">
          <div class="edit-grid">
            <div class="field full">
              <label>Job Title</label>
              <input type="text" id="e-title-${job.id}" value="${esc(job.title)}">
            </div>
            <div class="field">
              <label>Type</label>
              <select id="e-type-${job.id}">
                ${['Full-Time','Part-Time','Contract','Internship'].map(t =>
                  `<option ${job.type === t ? 'selected' : ''}>${t}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Location</label>
              <input type="text" id="e-loc-${job.id}" value="${esc(job.location || '')}">
            </div>
            <div class="field">
              <label>Department</label>
              <input type="text" id="e-dept-${job.id}" value="${esc(job.department || '')}">
            </div>
            <div class="field full">
              <label>Job Description</label>
              <div id="e-desc-editor-${job.id}"></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-top:1rem;">
            <label class="toggle-wrap">
              <span class="toggle">
                <input type="checkbox" id="e-active-${job.id}" ${job.active ? 'checked' : ''}>
                <span class="slider"></span>
              </span>
              Show on careers page
            </label>
            <div style="display:flex;gap:.5rem">
              <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${job.id}')">Cancel</button>
              <button class="btn btn-primary btn-sm" onclick="saveJob('${job.id}')">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    // Init a Quill editor for each job's edit form (after DOM is rendered)
    jobs.forEach(job => {
      const editorEl = document.getElementById(`e-desc-editor-${job.id}`);
      if (!editorEl) return;
      const q = new Quill(editorEl, {
        theme: 'snow',
        placeholder: 'Enter job description...',
        modules: { toolbar: TOOLBAR }
      });
      // Load existing HTML content
      if (job.description) {
        q.clipboard.dangerouslyPasteHTML(job.description);
      }
      editQuilts[job.id] = q;
    });
  }

  // ── Add ───────────────────────────────────────────────────────────────────
  async function addJob() {
    const title = document.getElementById('new-title').value.trim();
    if (!title) { document.getElementById('new-title').focus(); return; }
    const descHtml = newQuill.root.innerHTML;
    const isEmpty = newQuill.getText().trim().length === 0;

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    const res = await fetch(`${API}/admin/jobs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({
        title,
        type: document.getElementById('new-type').value,
        location: document.getElementById('new-location').value.trim(),
        department: document.getElementById('new-dept').value.trim(),
        description: isEmpty ? '' : descHtml,
      }),
    });
    btn.disabled = false;
    if (res.ok) {
      document.getElementById('new-title').value = '';
      document.getElementById('new-location').value = '';
      document.getElementById('new-dept').value = '';
      newQuill.setContents([]);
      const msg = document.getElementById('add-msg');
      msg.style.display = 'inline';
      setTimeout(() => msg.style.display = 'none', 2500);
      loadJobs();
    }
  }

  // ── Edit toggle ───────────────────────────────────────────────────────────
  function toggleEdit(id) {
    const el = document.getElementById(`edit-${id}`);
    el.classList.toggle('open');
  }

  // ── Save ──────────────────────────────────────────────────────────────────
  async function saveJob(id) {
    const q = editQuilts[id];
    const descHtml = q ? q.root.innerHTML : '';
    const isEmpty = q ? q.getText().trim().length === 0 : true;

    const res = await fetch(`${API}/admin/jobs/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({
        title: document.getElementById(`e-title-${id}`).value.trim(),
        type: document.getElementById(`e-type-${id}`).value,
        location: document.getElementById(`e-loc-${id}`).value.trim(),
        department: document.getElementById(`e-dept-${id}`).value.trim(),
        description: isEmpty ? '' : descHtml,
        active: document.getElementById(`e-active-${id}`).checked,
      }),
    });
    if (res.ok) loadJobs();
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  async function deleteJob(id, title) {
    if (!confirm(`Delete "${title}"?\nThis cannot be undone.`)) return;
    await fetch(`${API}/admin/jobs/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-key': ADMIN_KEY },
    });
    loadJobs();
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
