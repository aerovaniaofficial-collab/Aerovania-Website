<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs Admin — Aerovania</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --cyan: #34C0C5;
      --cyan-dark: #2a9a9e;
      --red: #ef4444;
      --green: #22c55e;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1rem;
    }
    .login-card {
      background: var(--card); border-radius: 20px; padding: 2.5rem;
      width: 100%; max-width: 380px; box-shadow: var(--shadow);
      text-align: center;
    }
    .login-card h1 { font-family: 'Sora', sans-serif; font-size: 1.5rem; margin-bottom: .4rem; }
    .login-card p { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }
    .login-card input {
      width: 100%; padding: .8rem 1rem; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: .95rem; outline: none; margin-bottom: 1rem;
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--cyan); }
    .login-error { color: var(--red); font-size: .85rem; margin-bottom: .75rem; display: none; }

    /* ── Layout ── */
    #app { display: none; }
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: .9rem 2rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .topbar-brand { display: flex; align-items: center; gap: .75rem; }
    .topbar-brand span { font-family: 'Sora', sans-serif; font-size: 1.05rem; font-weight: 800; }
    .topbar-brand small { font-size: .75rem; color: var(--muted); font-weight: 400; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .badge-count {
      background: var(--cyan); color: #fff; font-size: .72rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 50px;
    }
    .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Add form ── */
    .add-card {
      background: var(--card); border-radius: 16px; padding: 1.75rem 2rem;
      box-shadow: var(--shadow); margin-bottom: 2rem;
    }
    .add-card h2 { font-family: 'Sora', sans-serif; font-size: 1.1rem; margin-bottom: 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .field label { font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .field input, .field select {
      padding: .7rem .9rem; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .93rem; font-family: 'Inter', sans-serif; outline: none;
      background: #fff; transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--cyan); }
    .form-actions { margin-top: 1.25rem; display: flex; gap: .75rem; align-items: center; }
    .add-msg { font-size: .85rem; color: var(--green); display: none; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .65rem 1.4rem; border-radius: 10px; font-size: .88rem;
      font-weight: 600; cursor: pointer; border: none; transition: .15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary { background: var(--cyan); color: #fff; }
    .btn-primary:hover { background: var(--cyan-dark); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }
    .btn-danger { background: transparent; color: var(--red); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: .4rem .9rem; font-size: .8rem; border-radius: 8px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Job list ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-header h2 { font-family: 'Sora', sans-serif; font-size: 1.1rem; }
    .job-list { display: flex; flex-direction: column; gap: .75rem; }
    .job-row {
      background: var(--card); border-radius: 14px; padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow); display: flex; align-items: center;
      gap: 1.25rem; flex-wrap: wrap;
    }
    .job-row.inactive { opacity: .55; }
    .job-row-info { flex: 1; min-width: 200px; }
    .job-row-info h4 { font-size: .97rem; font-weight: 600; margin-bottom: .35rem; }
    .job-tags { display: flex; gap: .5rem; flex-wrap: wrap; }
    .tag {
      font-size: .72rem; font-weight: 600; padding: .2rem .65rem;
      border-radius: 50px; background: rgba(52,192,197,.1); color: var(--cyan);
    }
    .tag.dept { background: #f1f5f9; color: var(--muted); }
    .tag.inactive-tag { background: #fef2f2; color: #ef4444; }
    .job-row-actions { display: flex; gap: .5rem; flex-shrink: 0; }

    /* ── Edit inline ── */
    .edit-row {
      background: #f8fafc; border: 1.5px solid var(--cyan);
      border-radius: 14px; padding: 1.25rem 1.5rem;
      display: none; flex-direction: column; gap: 1rem;
    }
    .edit-row.open { display: flex; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .edit-grid .full { grid-column: 1 / -1; }

    /* ── Toggle switch ── */
    .toggle-wrap { display: flex; align-items: center; gap: .6rem; font-size: .85rem; color: var(--muted); }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #cbd5e1; border-radius: 50px;
      cursor: pointer; transition: .2s;
    }
    .slider::before {
      content: ''; position: absolute; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; left: 3px; top: 3px; transition: .2s;
    }
    .toggle input:checked + .slider { background: var(--cyan); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: .95rem; }

    @media (max-width: 600px) {
      .form-grid, .edit-grid { grid-template-columns: 1fr; }
      .form-grid .full, .edit-grid .full { grid-column: 1; }
      .topbar { padding: .9rem 1rem; }
      .main { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Aerovania Admin</h1>
    <p>Enter your admin key to manage job postings</p>
    <p class="login-error" id="login-error">Incorrect key. Try again.</p>
    <input type="password" id="key-input" placeholder="Admin key" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="login()">Sign In</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <span>Jobs Admin</span>
      <small>Aerovania Careers</small>
    </div>
    <div class="topbar-right">
      <span class="badge-count" id="active-count">0 active</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- Add new job -->
    <div class="add-card">
      <h2>Add New Job Posting</h2>
      <div class="form-grid">
        <div class="field full">
          <label>Job Title *</label>
          <input type="text" id="new-title" placeholder="e.g. Senior AI Engineer">
        </div>
        <div class="field">
          <label>Employment Type</label>
          <select id="new-type">
            <option>Full-Time</option>
            <option>Part-Time</option>
            <option>Contract</option>
            <option>Internship</option>
          </select>
        </div>
        <div class="field">
          <label>Location</label>
          <input type="text" id="new-location" placeholder="e.g. Nagpur / Remote">
        </div>
        <div class="field">
          <label>Department</label>
          <input type="text" id="new-dept" placeholder="e.g. Engineering">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="add-btn" onclick="addJob()">+ Add Job</button>
        <span class="add-msg" id="add-msg">✓ Job added successfully</span>
      </div>
    </div>

    <!-- Job list -->
    <div class="section-header">
      <h2>Current Postings</h2>
    </div>
    <div class="job-list" id="job-list">
      <div class="empty">Loading...</div>
    </div>
  </div>
</div>

<script>
  // If served from backend (localhost:3001/admin), API is same origin.
  // If opened directly as a file or from a different port, set full URL.
  const API_BASE = window.location.port === '3001'
    ? ''
    : 'http://localhost:3001';
  const API = API_BASE + '/api';
  let ADMIN_KEY = '';

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function login() {
    const key = document.getElementById('key-input').value.trim();
    if (!key) return;
    document.getElementById('login-error').style.display = 'none';
    try {
      const res = await fetch(`${API}/admin/jobs`, {
        headers: { 'x-admin-key': key }
      });
      if (res.ok) {
        ADMIN_KEY = key;
        sessionStorage.setItem('aero_admin_key', key);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadJobs();
      } else {
        document.getElementById('login-error').style.display = 'block';
        sessionStorage.removeItem('aero_admin_key');
      }
    } catch (err) {
      document.getElementById('login-error').textContent = 'Cannot reach server. Is the backend running?';
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('aero_admin_key');
    location.reload();
  }

  // Auto-login from session
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('aero_admin_key');
    if (saved) {
      document.getElementById('key-input').value = saved;
      // Small delay to ensure DOM is ready
      setTimeout(login, 50);
    }
    document.getElementById('key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  });

  // ── Load jobs ─────────────────────────────────────────────────────────────
  async function loadJobs() {
    const res = await fetch(`${API}/admin/jobs`, { headers: { 'x-admin-key': ADMIN_KEY } });
    const jobs = await res.json();
    renderJobs(jobs);
    document.getElementById('active-count').textContent = `${jobs.filter(j => j.active).length} active`;
  }

  function renderJobs(jobs) {
    const list = document.getElementById('job-list');
    if (!jobs.length) { list.innerHTML = '<div class="empty">No job postings yet. Add one above.</div>'; return; }
    list.innerHTML = jobs.map(job => `
      <div>
        <div class="job-row ${job.active ? '' : 'inactive'}" id="row-${job.id}">
          <div class="job-row-info">
            <h4>${esc(job.title)}</h4>
            <div class="job-tags">
              <span class="tag">${esc(job.type)}</span>
              ${job.location ? `<span class="tag">${esc(job.location)}</span>` : ''}
              ${job.department ? `<span class="tag dept">${esc(job.department)}</span>` : ''}
              ${!job.active ? '<span class="tag inactive-tag">Hidden</span>' : ''}
            </div>
          </div>
          <div class="job-row-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${job.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteJob('${job.id}', '${esc(job.title)}')">Delete</button>
          </div>
        </div>
        <div class="edit-row" id="edit-${job.id}">
          <div class="edit-grid">
            <div class="field full">
              <label>Job Title</label>
              <input type="text" id="e-title-${job.id}" value="${esc(job.title)}">
            </div>
            <div class="field">
              <label>Type</label>
              <select id="e-type-${job.id}">
                ${['Full-Time','Part-Time','Contract','Internship'].map(t =>
                  `<option ${job.type === t ? 'selected' : ''}>${t}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Location</label>
              <input type="text" id="e-loc-${job.id}" value="${esc(job.location)}">
            </div>
            <div class="field">
              <label>Department</label>
              <input type="text" id="e-dept-${job.id}" value="${esc(job.department)}">
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
            <label class="toggle-wrap">
              <span class="toggle">
                <input type="checkbox" id="e-active-${job.id}" ${job.active ? 'checked' : ''}>
                <span class="slider"></span>
              </span>
              Show on careers page
            </label>
            <div style="display:flex;gap:.5rem">
              <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${job.id}')">Cancel</button>
              <button class="btn btn-primary btn-sm" onclick="saveJob('${job.id}')">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── Add ───────────────────────────────────────────────────────────────────
  async function addJob() {
    const title = document.getElementById('new-title').value.trim();
    if (!title) { document.getElementById('new-title').focus(); return; }
    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    const res = await fetch(`${API}/admin/jobs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({
        title,
        type: document.getElementById('new-type').value,
        location: document.getElementById('new-location').value.trim(),
        department: document.getElementById('new-dept').value.trim(),
      }),
    });
    btn.disabled = false;
    if (res.ok) {
      document.getElementById('new-title').value = '';
      document.getElementById('new-location').value = '';
      document.getElementById('new-dept').value = '';
      const msg = document.getElementById('add-msg');
      msg.style.display = 'inline';
      setTimeout(() => msg.style.display = 'none', 2500);
      loadJobs();
    }
  }

  // ── Edit toggle ───────────────────────────────────────────────────────────
  function toggleEdit(id) {
    const el = document.getElementById(`edit-${id}`);
    el.classList.toggle('open');
  }

  // ── Save ──────────────────────────────────────────────────────────────────
  async function saveJob(id) {
    const res = await fetch(`${API}/admin/jobs/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({
        title: document.getElementById(`e-title-${id}`).value.trim(),
        type: document.getElementById(`e-type-${id}`).value,
        location: document.getElementById(`e-loc-${id}`).value.trim(),
        department: document.getElementById(`e-dept-${id}`).value.trim(),
        active: document.getElementById(`e-active-${id}`).checked,
      }),
    });
    if (res.ok) loadJobs();
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  async function deleteJob(id, title) {
    if (!confirm(`Delete "${title}"?\nThis cannot be undone.`)) return;
    await fetch(`${API}/admin/jobs/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-key': ADMIN_KEY },
    });
    loadJobs();
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
